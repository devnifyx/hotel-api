<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelBooking - My Luxury Escape | Customer Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a2a3a; 
            --accent: #3498db; 
            --bg: #f8fafc;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #334155;
            line-height: 1.6;
        }
        .navbar { 
            background: var(--primary); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand { 
            font-weight: 600; 
            letter-spacing: -0.5px;
            color: white !important; 
        }
        .card { 
            border: none; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            transition: var(--transition);
            background: white;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .btn { border-radius: 10px; padding: 0.6rem 1.5rem; font-weight: 500; transition: var(--transition); }
        .btn-primary { background: var(--accent); border: none; }
        .btn-primary:hover { background: #2980b9; transform: scale(1.02); }
        
        .badge-soft { padding: 6px 12px; border-radius: 20px; font-weight: 500; }
        .bg-soft-success { background: #dcfce7; color: #166534; }
        .bg-soft-warning { background: #fef9c3; color: #854d0e; }
        .bg-soft-danger { background: #fee2e2; color: #991b1b; }

        .hotel-img-wrapper { height: 200px; overflow: hidden; position: relative; }
        .hotel-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .card:hover .hotel-img-wrapper img { transform: scale(1.1); }
        
        .weather-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .map-container {
            height: 300px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .form-control { border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; }
        
        /* New Styles for Wishlist and Reviews */
        .btn-wishlist {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: var(--transition);
            z-index: 10;
        }
        .btn-wishlist.active { color: #e74c3c; }
        .btn-wishlist:hover { transform: scale(1.1); }
        
        .review-card { border-bottom: 1px solid #f1f5f9; padding: 15px 0; }
        .star-rating { color: #f1c40f; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="customer.html"><i class="fas fa-hotel me-2"></i>HotelBooking</a>
        <div class="ms-auto d-flex align-items-center">
            <span id="user-display" class="text-white me-3 fw-medium"></span>
            <button id="logout-btn" class="btn btn-outline-light btn-sm px-3" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<script src="config.js"></script>

<div class="container mt-5">
    <div id="user-section">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Discover Stays</h4>
                    <span class="text-muted small fw-medium" id="hotel-count"></span>
                </div>
                <div class="row g-4" id="hotel-list"></div>
            </div>
            <div class="col-lg-4">
                <h4 class="fw-bold mb-4">My Itinerary</h4>
                <div id="my-bookings"></div>
            </div>
        </div>
    </div>
</div>

<!-- Booking Modal -->
<div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="bookingModalLabel">Book Your Stay</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <p class="text-muted small mb-4" id="bookingHotelName"></p>
                <form id="booking-modal-form">
                    <input type="hidden" id="modal-hotel-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">CHECK-IN</label>
                            <input type="date" id="modal-check-in" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">CHECK-OUT</label>
                            <input type="date" id="modal-check-out" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4 shadow-sm py-3">Confirm Reservation</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg text-center" style="border-radius: 20px;">
            <div class="modal-body p-5">
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Booking Confirmed!</h3>
                <p class="text-muted mb-4">Your luxury escape has been reserved successfully.</p>
                <button type="button" id="success-modal-btn" class="btn btn-primary w-100 py-3 shadow-sm" data-bs-dismiss="modal">Great, thanks!</button>
            </div>
        </div>
    </div>
</div>

<!-- Map Modal -->
<div class="modal fade" id="mapModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="mapModalLabel">Hotel Location</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div id="map-frame" class="map-container"></div>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg text-center" style="border-radius: 20px;">
            <div class="modal-body p-5">
                <div class="mb-4">
                    <div class="bg-soft-success rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                        <i class="fas fa-credit-card text-success fs-2"></i>
                    </div>
                </div>
                <h3 class="fw-bold mb-2">Secure Payment</h3>
                <p class="text-muted mb-4">You are paying for your reservation at <span id="pay-hotel-name" class="fw-bold"></span>.</p>
                
                <div class="bg-light p-3 rounded-3 mb-4 d-flex justify-content-between align-items-center">
                    <span class="text-muted">Total Amount</span>
                    <span class="fs-4 fw-bold text-primary" id="pay-amount-display"></span>
                </div>

                <form id="payment-demo-form">
                    <input type="hidden" id="pay-booking-id">
                    <input type="hidden" id="pay-amount-value">
                    <div class="mb-4 text-start">
                        <label class="form-label text-muted small fw-bold">SELECT METHOD (DEMO)</label>
                        <select class="form-select border-0 bg-light" id="pay-method">
                            <option value="Credit Card">Credit Card</option>
                            <option value="Online Banking">Online Banking</option>
                            <option value="E-Wallet">E-Wallet</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm">Complete Payment</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Review Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Guest Reviews</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <p class="text-muted small mb-4" id="reviewHotelName"></p>
                <div id="review-list" class="mb-4" style="max-height: 300px; overflow-y: auto;">
                    <!-- Reviews will be loaded here -->
                </div>
                <hr>
                <h6 class="fw-bold mb-3">Add a Review</h6>
                <form id="add-review-form">
                    <input type="hidden" id="review-hotel-id">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">RATING</label>
                        <select id="review-rating" class="form-select border-0 bg-light" required>
                            <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                            <option value="4">⭐⭐⭐⭐ (Good)</option>
                            <option value="3">⭐⭐⭐ (Average)</option>
                            <option value="2">⭐⭐ (Poor)</option>
                            <option value="1">⭐ (Terrible)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">YOUR COMMENT</label>
                        <textarea id="review-comment" class="form-control border-0 bg-light" rows="3" placeholder="Share your experience..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm">Submit Review</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/hotel-api/api';
    const API_KEY = CONFIG.INTERNAL_API_KEY;
    const WEATHER_API_KEY = CONFIG.WEATHER_API_KEY;
    const CURRENCY = 'RM';
    let currentUser = null;
    let userWishlist = [];


    // Session check
    const storedUser = localStorage.getItem('hotelUser');
    if (!storedUser) {
        window.location.href = 'login.html';
    } else {
        currentUser = JSON.parse(storedUser);
        if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
        }
        document.getElementById('user-display').innerText = `Hi, ${currentUser.name}`;
    }

    const formatDate = (dateStr) => {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        return await res.json();
    }

    async function fetchWeather(city) {
        try {
            if (!city) return "Weather N/A";
            const searchCity = city.split(' ')[0]; 
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(searchCity)}&appid=${WEATHER_API_KEY}&units=metric`);
            const data = await res.json();
            if (data.cod === 200) {
                return `${data.weather[0].main} ${Math.round(data.main.temp)}°C`;
            }
            return "Weather N/A";
        } catch (error) {
            console.error("Weather fetch error:", error);
            return "Weather N/A";
        }
    }

    function logout() {
        localStorage.removeItem('hotelUser');
        window.location.href = 'login.html';
    }

    async function loadUserData() {
        console.log("Starting loadUserData...");
        try {
            // Fetch everything in parallel
            const [hotels, bookings, wishlistRes] = await Promise.all([
                apiCall('/hotels'),
                apiCall('/bookings'),
                apiCall(`/wishlists/${currentUser.id}`).catch(err => {
                    console.warn("Wishlist fetch failed:", err);
                    return { success: false, data: [] };
                })
            ]);
            
            console.log("API Responses:", { hotels, bookings, wishlistRes });

            // Defensive data extraction
            const hotelData = (hotels && hotels.success) ? hotels.data : [];
            const bookingData = (bookings && bookings.success) ? bookings.data : [];
            userWishlist = (wishlistRes && wishlistRes.success && Array.isArray(wishlistRes.data)) ? wishlistRes.data : [];
            
            if (!Array.isArray(hotelData)) {
                console.error("hotelData is not an array:", hotelData);
                throw new Error("Invalid hotel data received");
            }

            document.getElementById('hotel-count').innerText = `${hotelData.length} Properties Found`;
            
            if (hotelData.length === 0) {
                document.getElementById('hotel-list').innerHTML = '<div class="col-12"><p class="text-center text-muted p-5 bg-white rounded-4">No hotels available at the moment.</p></div>';
            } else {
                // Fetch weather for all hotels in parallel
                const hotelCards = await Promise.all(hotelData.map(async (h) => {
                    const weather = await fetchWeather(h.location);
                    const isWishlisted = Array.isArray(userWishlist) && userWishlist.includes(parseInt(h.id));
                    
                    return `
                        <div class="col-md-6">
                            <div class="card h-100 border-0">
                                <div class="hotel-img-wrapper">
                                    <button class="btn-wishlist ${isWishlisted ? 'active' : ''}" onclick="toggleWishlist(${h.id})">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                    <div class="weather-badge"><i class="fas fa-cloud-sun me-1"></i> ${weather}</div>
                                    <img src="${h.image_url || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=800'}" alt="${h.name}">
                                </div>
                                <div class="card-body p-4">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="fw-bold mb-0">${h.name}</h5>
                                        <span class="text-primary fw-bold">${CURRENCY}${h.price_per_night}<small class="text-muted fw-normal" style="font-size:0.7rem">/nt</small></span>
                                    </div>
                                    <p class="text-muted small mb-3"><i class="fas fa-map-marker-alt me-1"></i> ${h.location}</p>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-primary flex-grow-1 btn-sm shadow-sm" onclick="bookHotel(${h.id}, '${h.name}')">Book Now</button>
                                        <button class="btn btn-outline-primary btn-sm shadow-sm" onclick="showMap('${h.location}', '${h.name}')"><i class="fas fa-map"></i></button>
                                    </div>
                                    <button class="btn btn-link btn-sm text-muted mt-3 p-0 text-decoration-none small" onclick="openReviewModal(${h.id}, '${h.name}')">
                                        <i class="far fa-comment-dots me-1"></i> View Guest Reviews
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }));
                document.getElementById('hotel-list').innerHTML = hotelCards.join('');
            }

            const myBookings = bookingData.filter(b => b.user_id == currentUser.id);
            
            document.getElementById('my-bookings').innerHTML = myBookings.length ? myBookings.map(b => `
                <div class="card p-3 mb-3 border-0">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="mb-0 fw-bold small">${b.hotel_name}</h6>
                        <span class="badge-soft small ${b.status === 'confirmed' ? 'bg-soft-success' : (b.status === 'cancelled' ? 'bg-soft-danger' : 'bg-soft-warning')}">${b.status.toUpperCase()}</span>
                    </div>
                    <p class="small text-muted mb-3"><i class="far fa-calendar-alt me-1"></i> ${formatDate(b.check_in)} - ${formatDate(b.check_out)}</p>
                    <div class="d-flex gap-2">
                        ${b.status === 'pending' ? `<button class="btn btn-primary btn-sm flex-grow-1" style="font-size:0.7rem" onclick="openPaymentModal(${b.id}, '${b.hotel_name}', 350)">PAY NOW</button>` : ''}
                        ${b.status !== 'cancelled' ? `<button class="btn btn-link btn-sm text-danger p-0 text-decoration-none fw-bold" style="font-size:0.7rem" onclick="cancelBooking(${b.id})">CANCEL</button>` : ''}
                    </div>
                </div>
            `).join('') : '<p class="text-muted text-center small p-4 bg-white rounded-4">No reservations yet.</p>';

        } catch (error) {
            console.error("Critical Load Error:", error);
            document.getElementById('hotel-list').innerHTML = `<div class="col-12"><div class="alert alert-danger rounded-4 p-4">Error: ${error.message}. Please check console for details.</div></div>`;
        }
    }

    async function cancelBooking(id) {
        if (!confirm('Are you sure you want to cancel this reservation?')) return;
        const res = await apiCall(`/bookings/cancel/${id}`, 'POST');
        if (res.success) {
            alert('Reservation cancelled.');
            loadUserData();
        } else alert(res.message);
    }

    // --- New Wishlist and Review Functions ---
    async function toggleWishlist(hotelId) {
        const res = await apiCall('/wishlists', 'POST', {
            user_id: currentUser.id,
            hotel_id: hotelId
        });
        if (res.success) loadUserData();
    }

    async function openReviewModal(hotelId, hotelName) {
        document.getElementById('review-hotel-id').value = hotelId;
        document.getElementById('reviewHotelName').innerText = `What guests say about ${hotelName}`;
        
        const res = await apiCall(`/reviews/${hotelId}`);
        const list = document.getElementById('review-list');
        
        if (res.success && res.data.length > 0) {
            list.innerHTML = res.data.map(r => `
                <div class="review-card">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="fw-bold small">${r.user_name}</span>
                        <div class="star-rating small">${'⭐'.repeat(r.rating)}</div>
                    </div>
                    <p class="text-muted small mb-0">"${r.comment}"</p>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<p class="text-center text-muted small p-4">No reviews yet. Be the first!</p>';
        }
        
        new bootstrap.Modal(document.getElementById('reviewModal')).show();
    }

    document.getElementById('add-review-form').onsubmit = async (e) => {
        e.preventDefault();
        const hotelId = document.getElementById('review-hotel-id').value;
        const res = await apiCall('/reviews', 'POST', {
            user_id: currentUser.id,
            hotel_id: parseInt(hotelId),
            rating: parseInt(document.getElementById('review-rating').value),
            comment: document.getElementById('review-comment').value
        });
        
        if (res.success) {
            alert('Review submitted!');
            bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
            document.getElementById('add-review-form').reset();
            loadUserData();
        } else alert(res.message);
    };
    // ------------------------------------------

    function openPaymentModal(bookingId, hotelName, amount) {
        document.getElementById('pay-booking-id').value = bookingId;
        document.getElementById('pay-hotel-name').innerText = hotelName;
        document.getElementById('pay-amount-display').innerText = `${CURRENCY}${amount}`;
        document.getElementById('pay-amount-value').value = amount;
        
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
    }

    document.getElementById('payment-demo-form').onsubmit = async (e) => {
        e.preventDefault();
        const bookingId = document.getElementById('pay-booking-id').value;
        const amount = document.getElementById('pay-amount-value').value;
        const method = document.getElementById('pay-method').value;

        const createRes = await apiCall('/payments', 'POST', {
            booking_id: parseInt(bookingId),
            amount: parseFloat(amount),
            method: method
        });

        if (createRes.success) {
            const updateRes = await apiCall(`/payments/${createRes.id}`, 'PUT', { status: 'paid' });
            if (updateRes.success) {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                const successModal = new bootstrap.Modal(document.getElementById('successModal'));
                document.querySelector('#successModal h3').innerText = "Payment Successful!";
                document.querySelector('#successModal p').innerText = "Your payment has been processed and your booking is now CONFIRMED.";
                document.getElementById('success-modal-btn').innerText = "Great, thanks!";
                document.getElementById('success-modal-btn').onclick = null;
                successModal.show();
                loadUserData();
            } else alert('Payment update failed');
        } else alert('Payment creation failed');
    };

    function bookHotel(id, name) {
        document.getElementById('modal-hotel-id').value = id;
        document.getElementById('bookingHotelName').innerText = `Planning your stay at ${name}`;
        const today = new Date().toISOString().split('T')[0];
        const nextWeek = new Date(Date.now() + 86400000 * 3).toISOString().split('T')[0];
        document.getElementById('modal-check-in').value = today;
        document.getElementById('modal-check-out').value = nextWeek;
        const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));
        bookingModal.show();
    }

    document.getElementById('booking-modal-form').onsubmit = async (e) => {
        e.preventDefault();
        const hotelId = document.getElementById('modal-hotel-id').value;
        const hotelName = document.getElementById('bookingHotelName').innerText.replace('Planning your stay at ', '');
        const res = await apiCall('/bookings', 'POST', {
            hotel_id: parseInt(hotelId),
            user_id: currentUser.id,
            check_in: document.getElementById('modal-check-in').value,
            check_out: document.getElementById('modal-check-out').value
        });
        
        if (res.success) {
            bootstrap.Modal.getInstance(document.getElementById('bookingModal')).hide();
            const successModal = new bootstrap.Modal(document.getElementById('successModal'));
            document.querySelector('#successModal h3').innerText = "Booking Successful!";
            document.querySelector('#successModal p').innerText = "Your reservation is saved. Please proceed to payment to confirm your luxury stay.";
            const btn = document.getElementById('success-modal-btn');
            btn.innerText = "Proceed to Payment";
            btn.onclick = () => { openPaymentModal(res.booking_id, hotelName, 350); };
            successModal.show();
            loadUserData();
        } else alert(res.message);
    };

    function showMap(location, hotelName) {
        const mapFrame = document.getElementById('map-frame');
        const encodedLocation = encodeURIComponent(location);
        mapFrame.innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${encodedLocation}&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>`;
        document.getElementById('mapModalLabel').innerText = `Location: ${hotelName}`;
        new bootstrap.Modal(document.getElementById('mapModal')).show();
    }

    loadUserData();
</script>
